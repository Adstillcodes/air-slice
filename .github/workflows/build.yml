name: Build executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            zip_name: AirSlice-windows.zip
          - os: macos-latest
            zip_name: AirSlice-macos-arm64.zip
          - os: ubuntu-latest
            zip_name: AirSlice-linux.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Linux build deps (opencv runtime libs)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller AirSlice.spec

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/AirSlice -DestinationPath ${{ matrix.zip_name }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && ditto -c -k --keepParent AirSlice.app ../${{ matrix.zip_name }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -qr ../${{ matrix.zip_name }} AirSlice

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.zip_name }}
